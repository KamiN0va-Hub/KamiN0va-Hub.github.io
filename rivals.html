<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>KamiN0va's Rivals Scripts</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background-color: rgba(255, 255, 255, 0.03); /* 은은한 반투명 배경 */
            border: 2px solid #00ffcc;
            border-radius: 16px; /* 부드러운 라운딩 */
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 255, 210, 0.1);
            text-align: center;
        }
        h1 { color: #00ffcc; font-size: 2rem; margin-bottom: 25px; }
        .script-box {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: left;
        }
        .script-title { color: #00ffcc; font-weight: bold; margin-bottom: 8px; }
        .script-code {
            background-color: #000;
            color: #00ff55;
            padding: 10px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: #aaaaaa;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .back-btn:hover { color: #ffffff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Rivals 스크립트 보관함</h1>
        
        <div class="script-box">
            <div class="script-title"># 메인 기능 스크립트</div>
            <div class="script-code">loadstring(game:HttpGet("https://raw.githubusercontent.com/..."))()</div>
        </div>

        <div class="script-box">
            <div class="script-title"># 유틸리티 기능 스크립트</div>
            <div class="script-code">print("KamiN0va Hub Loaded!")</div>
        </div>

        <a href="index.html" class="back-btn">⬅️ 메인 화면으로 돌아가기</a>
    </div>
</body>
</html>
