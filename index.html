<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>KamiN0va's Space</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 40px;
            border: 2px solid #00ffcc;
            border-radius: 16px; /* 부드러운 라운딩 */
            background-color: rgba(255, 255, 255, 0.03); /* 반투명 배경 */
            box-shadow: 0 4px 20px rgba(0, 255, 210, 0.1);
        }
        h1 {
            color: #00ffcc;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            color: #aaaaaa;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        .rivals-btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: transparent;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .rivals-btn:hover {
            background-color: #00ffcc;
            color: #121212;
            box-shadow: 0 0 15px rgba(0, 255, 210, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>KamiN0va's Space</h1>
        <p>디코에서 타고 들어오는 나만의 비밀 기지</p>
        
        <!-- 현재 창에서 바로 화면이 전환되도록 설정했습니다 -->
        <a href="rivals.html" class="rivals-btn">🎮 라이벌 스크립트 보관함 이동</a>
    </div>
</body>
</html>
